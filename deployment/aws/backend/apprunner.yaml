# ========================================================
# AWS App Runner Configuration Specification (Strategy B)
# Service: Nexus AI Backend API
# ========================================================
version: 1.0

runtime: python3

build:
  commands:
    build:
      - pip install uv
      - uv pip install --system .
run:
  command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
    env: PORT
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: ENVIRONMENT
      value: "production"

instance:
  cpu: "1024"       # 1 vCPU
  memory: "2048"    # 2 GB RAM

observability:
  enabled: true

healthcheck:
  path: "/health"
  interval: 10
  timeout: 5
  healthyThreshold: 1
  unhealthyThreshold: 3
